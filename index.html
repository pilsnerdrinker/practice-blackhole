<body>
<header><h1>P3後半 ブラックホール練習</h1><div class="sub">Poikos式 / ヤーン式 / ギミック理解＋位置確認＋実践練習 / 25枚構成</div>

</main>
<script>
const ROLES=["MT","ST","H1","H2","D1","D2","D3","D4"];
const TH=["MT","ST","H1","H2"], DPS=["D1","D2","D3","D4"];
const ROLE_KIND={MT:'T',ST:'T',H1:'H',H2:'H',D1:'D',D2:'D',D3:'D',D4:'D'};
const markerByDice={1:["攻撃1","攻撃2","攻撃3"],2:["バインド1","バインド2","バインド3"],3:["禁止1","禁止2"]};
const markerKind=m=>m.startsWith("攻撃")?"攻撃":m.startsWith("バインド")?"バインド":"禁止";
const markerCls=m=>m.startsWith("攻撃")?"atk":m.startsWith("バインド")?"bind":"ban";
const BEAM_ORDER={1:["攻撃1"],2:["攻撃1","攻撃2"],3:["攻撃1","攻撃2","攻撃3"],4:["バインド1","攻撃2","攻撃3"],5:["バインド1","バインド2","攻撃3"],6:["バインド1","バインド2","バインド3"],7:["禁止1","バインド2","バインド3"],8:["禁止1","禁止2","バインド3"],9:["禁止1","禁止2"],10:["禁止2"]};
const BEAM_COUNTS={1:1,2:2,3:3,4:3,5:3,6:3,7:3,8:3,9:2,10:1};
const MARKER_BEAMS=Object.fromEntries(["攻撃1","攻撃2","攻撃3","バインド1","バインド2","バインド3","禁止1","禁止2"].map(m=>[m,[]]));
for(const [n,arr] of Object.entries(BEAM_ORDER)){ for(const m of arr) MARKER_BEAMS[m].push(Number(n)); }
const KEFKA_DIRS=[{name:"北",angle:0},{name:"北東",angle:45},{name:"東",angle:90},{name:"南東",angle:135},{name:"南",angle:180},{name:"南西",angle:225},{name:"西",angle:270},{name:"北西",angle:315}];
const AREA_LABEL={N:'北',E:'東',S:'南',W:'西'};

function shuffle(a){ a=[...a]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
function coord(angle,r){ const R=250*r, rad=(angle-90)*Math.PI/180; return {x:300+R*Math.cos(rad), y:300+R*Math.sin(rad)}; }
function coordRadius(angle,radius){ const rad=(angle-90)*Math.PI/180; return {x:300+radius*Math.cos(rad), y:300+radius*Math.sin(rad)}; }
function polarToArea(angle){ const a=(angle+360)%360; if(a>=315||a<45) return 'N'; if(a<135) return 'E'; if(a<225) return 'S'; return 'W'; }
function sortClockwiseFrom(items,kefkaAngle){ return [...items].sort((a,b)=>((a.angle-kefkaAngle+360)%360)-((b.angle-kefkaAngle+360)%360)); }
function handLabel(hand){ return hand==='right'?'右手':'左手'; }
function safeSideFromHand(hand){ return hand==='right'?'右':'左'; }
function bintaActionFromHand(hand){ return hand==='right'?'頭割り':'ロール散開'; }
function dummingBintaSide(hand){ return hand==='right'?'L':'R'; }
function dummingBintaAction(hand){ return hand==='right'?'頭割り':'ロール散開'; }
function dummingBintaVisualSide(hand){ return hand==='right'?'右':'左'; }
function deepClone(v){ return JSON.parse(JSON.stringify(v)); }

function buildCandidates(){
  const pts=[];
  const vertices=[[0,-230],[230,0],[0,230],[-230,0]];
  for(let i=0;i<4;i++){
    const p0=vertices[i], p1=vertices[(i+1)%4];
    for(const t of [0,1/3,2/3]){
      const x=p0[0]+(p1[0]-p0[0])*t, y=p0[1]+(p1[1]-p0[1])*t;
      if(!pts.some(p=>Math.abs(p.x-x)<1 && Math.abs(p.y-y)<1)) pts.push({x,y});
    }
  }
  vertices.forEach(([x,y])=>{ if(!pts.some(p=>Math.abs(p.x-x)<1 && Math.abs(p.y-y)<1)) pts.push({x,y}); });
  const outer=pts.map((p,i)=>{
    const angle=(Math.atan2(p.y,p.x)*180/Math.PI+90+360)%360; return {id:'o'+(i+1), x:300+p.x, y:300+p.y, angle, area:polarToArea(angle), ring:'outer'};
  });
  const inner=[0,45,90,135,180,225,270,315].map((a,i)=>{ const c=coord(a,0.42); return {id:'i'+(i+1), x:c.x, y:c.y, angle:a, area:polarToArea(a), ring:'inner'}; });
  return [...outer,...inner];
}
const ALL_CANDIDATES=buildCandidates();

let selfRole='MT';
let currentStrat='Poikos式';
let currentProblem=null;
let previousProblem=null;
let posSlide=0;

let practiceMode='continuous';
let practiceShowFinalLog=false;
let practiceFinalLogTimer=null;

const SLIDES=[

  {id:'p2', kind:'prep-split', title:'決戦2回目：2ボス分担'},

  {id:'s9', kind:'dumming-bokuchin', title:'ケフカ移動＋ダミング＋ぼくちん'},
  {id:'s10', kind:'thunder2', title:'サンダガ（強攻撃）'},
  {id:'s11', kind:'beam', beam:6, title:'ビーム6回目'},
  {id:'s12', kind:'beam', beam:7, title:'ビーム7回目'},
  {id:'s13', kind:'beam', beam:8, title:'ビーム8回目'},
  {id:'s14', kind:'whitehole', title:'ケフカ移動＋ホワイトホール'},

  {id:'s16', kind:'beam', beam:9, title:'ビーム9回目'},
  {id:'s17', kind:'beam', beam:10, title:'ビーム10回目＋ぼくちん'},
  {id:'s18', kind:'blizzaga', title:'ブリザガ'},
  {id:'s19', kind:'jitanda-prep', title:'どんどこ地団駄 準備'},
  {id:'s20', kind:'jitanda1', title:'どんどこ地団駄①'},
  {id:'s21', kind:'jitanda2', title:'どんどこ地団駄②'},

];

function populateSelfSelect(){
  const sel=document.getElementById('selfRoleSelect');
  sel.innerHTML=ROLES.map(r=>`<option ${r===selfRole?'selected':''}>${r}</option>`).join('');
  sel.onchange=e=>{ selfRole=e.target.value; renderAll(); };
}

function populateStratSelect(){
  const sel=document.getElementById('strat');
  if(!sel) return;
  sel.innerHTML=['Poikos式','ヤーン式'].map(s=>`<option ${s===currentStrat?'selected':''}>${s}</option>`).join('');
  sel.onchange=e=>{ currentStrat=e.target.value; renderAll(); };
}
function getSplitGroups(){
  if(currentStrat==='ヤーン式') return {chaos:['ST','H2','D1','D2'], ex:['MT','H1','D3','D4']};
  return {chaos:['MT','H2','D1','D2'], ex:['ST','H1','D3','D4']};
}

function genParty(){
  const dice={};
  const thDice=shuffle([1,2,2,3]);
  const dpsDice=shuffle([1,1,2,3]);
  TH.forEach((r,i)=>dice[r]=thDice[i]);
  DPS.forEach((r,i)=>dice[r]=dpsDice[i]);
  const byD={1:[],2:[],3:[]};
  ROLES.forEach(r=>byD[dice[r]].push(r));
  const markers={};
  [1,2,3].forEach(d=>{ const ms=shuffle(markerByDice[d]); byD[d].forEach((r,i)=>markers[r]=ms[i]); });
  const sludge=new Set(shuffle(ROLES).slice(0,2));
  return ROLES.map(r=>({role:r, dice:dice[r], marker:markers[r], sludge:sludge.has(r)}));
}

function genVisibleHoles(){
  const byArea={N:ALL_CANDIDATES.filter(c=>c.area==='N'),E:ALL_CANDIDATES.filter(c=>c.area==='E'),S:ALL_CANDIDATES.filter(c=>c.area==='S'),W:ALL_CANDIDATES.filter(c=>c.area==='W')};
  const counts={N:2,E:2,S:2,W:2};
  shuffle(['N','E','S','W']).slice(0,3).forEach(a=>counts[a]++);
  const out=[];
  for(const area of ['N','E','S','W']) out.push(...shuffle(byArea[area]).slice(0,counts[area]));
  return out;
}


function makePoint(id,x,y,ring='inner'){
  const angle=(Math.atan2(y-300,x-300)*180/Math.PI+90+360)%360;
  return {id,x,y,angle,area:polarToArea(angle),ring};
}
function getOuterCardinalPoints(){
  return [
    makePoint('outerN',300,76,'outer'),
    makePoint('outerE',524,300,'outer'),
    makePoint('outerS',300,524,'outer'),
    makePoint('outerW',76,300,'outer')
  ];
}
function makeBlackholePattern(patternNo, missingArea){
  const outerAll=getOuterCardinalPoints();
  const outer=outerAll.filter(h=>h.area!==missingArea);
  let inner=[], middle=[];
  if(patternNo===1){
    inner=[
      makePoint('p1_in_N',300,188,'inner'),
      makePoint('p1_in_E',392,300,'inner'),
      makePoint('p1_in_S',300,392,'inner'),
      makePoint('p1_in_W',208,300,'inner')
    ];
    middle=[
      makePoint('p1_mid_N',244,132,'middle'),
      makePoint('p1_mid_E',458,234,'middle'),
      makePoint('p1_mid_S',356,458,'middle'),
      makePoint('p1_mid_W',142,356,'middle')
    ];
  }else{
    const cx=300, cy=300, half=94, rot=-15*Math.PI/180;
    const base=[[-half,-half],[half,-half],[half,half],[-half,half]];
    const verts=base.map(([x,y],i)=>{
      const rx=x*Math.cos(rot)-y*Math.sin(rot), ry=x*Math.sin(rot)+y*Math.cos(rot);
      return makePoint('p2_in_'+i, cx+rx, cy+ry, 'inner');
    });
    inner=verts;
    middle=[
      makePoint('p2_mid_N',364,124,'middle'),
      makePoint('p2_mid_E',480,364,'middle'),
      makePoint('p2_mid_S',236,480,'middle'),
      makePoint('p2_mid_W',124,236,'middle')
    ];
  }
  return {patternNo, missingArea, outer, inner, middle, visible:[...inner, ...middle, ...outer]};
}
function chooseActiveOuter(outer, count){
  const ordered=sortClockwiseFrom(outer,0);
  if(count===1) return [pick(outer)];
  if(count===2){
    const start=Math.floor(Math.random()*ordered.length);
    return [ordered[start], ordered[(start+1)%ordered.length]];
  }
  return outer;
}
function chooseEndpointOuterArea(outer){
  const ordered=sortClockwiseFrom(outer,0);
  const start=Math.floor(Math.random()*ordered.length);
  const triple=[ordered[start], ordered[(start+1)%ordered.length], ordered[(start+2)%ordered.length]];
  return pick([triple[0], triple[2]]).area;
}
function makeBeamStatesForProblem(groupA, groupB, groupC, groupD){
  const states={};
  const missing12=pick(['N','E','S','W']);
  const missing35=pick(['N','E','S','W']);
  const missing68=pick(['N','E','S','W']);
  const missing910=pick(['N','E','S','W']);

  const outer12=makeBlackholePattern(1, missing12).outer;
  const beam1Area=chooseEndpointOuterArea(outer12);
  const beam2Areas=outer12.map(h=>h.area).filter(a=>a!==beam1Area);

  const outer35=makeBlackholePattern(1, missing35).outer;
  const beam35Areas=outer35.map(h=>h.area);

  const outer68=makeBlackholePattern(1, missing68).outer;
  const beam68Areas=outer68.map(h=>h.area);

  const outer910=makeBlackholePattern(1, missing910).outer;
  const beam10Area=pick(outer910.map(h=>h.area));
  const beam9Areas=outer910.map(h=>h.area).filter(a=>a!==beam10Area);

  function makeState(beam, kefka, missingArea, activeAreas){
    const patternNo=(beam%2===1)?1:2;
    const pat=makeBlackholePattern(patternNo, missingArea);
    const active=pat.outer.filter(h=>activeAreas.includes(h.area));
    const ordered=sortClockwiseFrom(active, kefka.angle);
    const answerMap={};
    BEAM_ORDER[beam].forEach((m,i)=>{ answerMap[m]=ordered[i]?.id || null; });
    return {visible:pat.visible, active, ordered, answerMap, patternNo, missingArea};
  }

  states[1]=makeState(1, groupA, missing12, [beam1Area]);
  states[2]=makeState(2, groupA, missing12, beam2Areas);
  states[3]=makeState(3, groupB, missing35, beam35Areas);
  states[4]=makeState(4, groupB, missing35, beam35Areas);
  states[5]=makeState(5, groupB, missing35, beam35Areas);
  states[6]=makeState(6, groupC, missing68, beam68Areas);
  states[7]=makeState(7, groupC, missing68, beam68Areas);
  states[8]=makeState(8, groupC, missing68, beam68Areas);
  states[9]=makeState(9, groupD, missing910, beam9Areas);
  states[10]=makeState(10, groupD, missing910, [beam10Area]);
  return states;
}

function genBeamState(beam, kefka){
  const visible=genVisibleHoles();
  const beamAreas=shuffle(['N','E','S','W']).slice(0,BEAM_COUNTS[beam]);
  const active=beamAreas.map(ar=>pick(visible.filter(v=>v.area===ar)));
  const ordered=sortClockwiseFrom(active,kefka.angle);
  const answerMap={};
  BEAM_ORDER[beam].forEach((m,i)=>{ answerMap[m]=ordered[i]?.id || null; });
  return {visible, active, ordered, beamAreas, answerMap};
}

function renderLearn(){
  const qs=buildLearnQuizzes();
  const state=currentProblem.learnState;
  const btns=`<div class="row" style="margin-bottom:8px"><button class="smallbtn" id="learnNext1">次の問題</button><button class="smallbtn" id="learnJudge1">判定</button><button class="smallbtn" id="learnShow1">正解を表示</button><button class="smallbtn" id="learnReset1">回答リセット</button></div>`;
  const quizzes=qs.map(q=>{
    const ans=state.answers[q.id] || [];
    const judged=state.judged || state.showAnswer;
    return `<div class="miniQuiz"><b>${q.prompt}</b><div class="choicewrap">${q.options.map(opt=>{
      const selected=ans.includes(String(opt));
      let cls='choice';
      if(selected) cls+=' active';
      if(judged){
        const correct=q.correct.includes(String(opt));
        if(correct) cls+=' correct';
        else if(selected) cls+=' wrong';
      }
      return `<button class="${cls}" data-q="${q.id}" data-opt="${String(opt)}">${opt}</button>`;
    }).join('')}</div><div class="result">${judged?renderLearnResult(q, ans):''}</div>${state.showAnswer?`<div class="answer">${q.explain}</div>`:''}</div>`;
  }).join('');
  const me=getSelfParty();
  const explanation=`
    <div class="eventTitle">ギミック理解</div>
    <div class="note">現在の自分：<b>${selfRole}</b> / サイコロ<b>${me.dice}</b> / マーカー<b>${me.marker}</b>${me.sludge?' / 汚泥あり':''}</div>
    <p><b>基本ルール</b></p>
    <ul>
      <li>サイコロ1 → <b>攻撃1〜3</b>、サイコロ2 → <b>バインド1〜3</b>、サイコロ3 → <b>禁止1〜2</b> のマーカーを自分で付ける。</li>
      <li>ブラックホールは<b>パターン1 / パターン2 を交互</b>に出す。各パターンは <b>外周3個＋中間4個＋内側4個</b> の計11個表示で、ビーム線は外周3個から出る。ビームは基本<b>ケフカ基準で時計回り優先</b>。</li>
      <li>1・2回目、9・10回目は出た玉が消えて次の線へ移動。3〜5回目は同じ外周3か所から3回、6〜8回目も同じ外周3か所から3回出る。1・2回目は2本目が対角にならないよう調整。ビーム担当は 1〜10回で <span class="kbd">A1 → A1,A2 → A1,A2,A3 → B1,A2,A3 → B1,B2,A3 → B1,B2,B3 → K1,B2,B3 → K1,K2,B3 → K1,K2 → K2</span>。</li>
      <li>ダミング時は <b>カオスを外周ケフカに向ける</b>。ケフカがいない側の半分へ逃げ、さらにビンタを処理。</li>
      <li>びんびんビンタは、右手上げなら <b>右側＋頭割り</b>、左手上げなら <b>左側＋ロール散開</b> として扱う。</li>
      <li>ビーム10後は <b>中央でブリザガを重ねる</b> → 地団駄・頭割り・塔処理へ。</li>
    </ul>
    <table class="table"><tr><th>マーカー</th><th>受けるビーム</th></tr>${Object.entries(MARKER_BEAMS).map(([m,b])=>`<tr><td>${m}</td><td>${b.join('、')}</td></tr>`).join('')}</table>
  `;
  document.getElementById('learn').innerHTML=`<div class="learnGrid"><div>${btns}${quizzes}${btns.replaceAll('1','2')}</div><div>${explanation}</div></div>`;
  document.querySelectorAll('#learn [data-q]').forEach(btn=>btn.onclick=()=>toggleLearnAnswer(btn.dataset.q, btn.dataset.opt));

    document.getElementById('learnNext'+n).onclick=()=>newProblem();
    document.getElementById('learnJudge'+n).onclick=()=>{ currentProblem.learnState.judged=true; renderLearn(); };
    document.getElementById('learnShow'+n).onclick=()=>{ currentProblem.learnState.judged=true; currentProblem.learnState.showAnswer=true; renderLearn(); };
    document.getElementById('learnReset'+n).onclick=()=>{ currentProblem.learnState.answers={}; currentProblem.learnState.judged=false; currentProblem.learnState.showAnswer=false; renderLearn(); };
  });
}
function toggleLearnAnswer(qid,opt){
  const q=buildLearnQuizzes().find(x=>x.id===qid);
  const ans=currentProblem.learnState.answers[qid] || [];
  if(q.type==='single') currentProblem.learnState.answers[qid]=[opt];
  else currentProblem.learnState.answers[qid]=ans.includes(opt)?ans.filter(x=>x!==opt):[...ans,opt];
  currentProblem.learnState.judged=false; currentProblem.learnState.showAnswer=false; renderLearn();
}
function renderLearnResult(q, ans){
  const want=[...q.correct].sort().join('|'); const got=[...ans].sort().join('|');
  return want===got?'<span class="ok">正解</span>':'<span class="bad">不正解</span> 正解：'+q.correct.join('、');
}


const TARGET_R=74;
function getChoiceLayout(kefkaAngle, variant='half'){
  const dir=coord(kefkaAngle,1.0);
  const kx=(dir.x-300), ky=(dir.y-300); const klen=Math.hypot(kx,ky)||1; const ukx=kx/klen, uky=ky/klen;
  const px=-uky, py=ukx;
  const awayX=-ukx, awayY=-uky;

  if(variant==='half'){
    const roleButtonR=14;
    const roleR=Math.round(TARGET_R*1.5 + roleButtonR);
    const stackR=TARGET_R+18;
    function mk(side){
      const dir=side==='L'?-1:1;
      const stackPt=coordRadius(kefkaAngle+dir*90, stackR);
      const hPt=coordRadius(kefkaAngle+dir*90, roleR);
      const tPt=coordRadius(kefkaAngle+dir*45, roleR);
      const dPt=coordRadius(kefkaAngle+dir*135, roleR);
      return {
        stack:{x:stackPt.x, y:stackPt.y, label:'全員', id:'stack'+side},
        H:{x:hPt.x, y:hPt.y, label:'H', id:side+'H'},
        T:{x:tPt.x, y:tPt.y, label:'T', id:side+'T'},
        D:{x:dPt.x, y:dPt.y, label:'D', id:side+'D'}
      };
    }
    const x1=300-awayX*280, y1=300-awayY*280, x2=300+awayX*280, y2=300+awayY*280;
    return {L:mk('L'), R:mk('R'), axis:{x1,y1,x2,y2}, ukx,uky,px,py,awayX,awayY};
  }

  if(variant==='quarter'){
    const opp=(kefkaAngle+180)%360;
    const leftA=(opp-45+360)%360, rightA=(opp+45)%360;
    function towardSign(baseAngle,targetAngle){ const d=((targetAngle-baseAngle+540)%360)-180; return d>=0?1:-1; }
    function mk(side, baseAngle){
      const sPos=coord(baseAngle,0.53), hPos=coord(baseAngle,0.72);
      const sign=towardSign(baseAngle,kefkaAngle);
      const T=coord(baseAngle+sign*20,0.78), D=coord(baseAngle-sign*20,0.78);
      return {stack:{x:sPos.x,y:sPos.y,label:'全員',id:'stack'+side}, H:{x:hPos.x,y:hPos.y,label:'H',id:side+'H'}, T:{x:T.x,y:T.y,label:'T',id:side+'T'}, D:{x:D.x,y:D.y,label:'D',id:side+'D'}};
    }
    const x1=300-awayX*280, y1=300-awayY*280, x2=300+awayX*280, y2=300+awayY*280;
    return {L:mk('L',leftA), R:mk('R',rightA), axis:{x1,y1,x2,y2}, ukx,uky,px,py,awayX,awayY};
  }

  const x1=300-awayX*280, y1=300-awayY*280, x2=300+awayX*280, y2=300+awayY*280;
  return {axis:{x1,y1,x2,y2}, ukx,uky,px,py,awayX,awayY};
}



function pointToAngle(x,y){
  return (Math.atan2(y-300,x-300)*180/Math.PI + 90 + 360) % 360;
}
function getBeam10GuideLayout(slide){
  const dir=coord(slide.kefka.angle,1.0);
  const kx=(dir.x-300), ky=(dir.y-300); const klen=Math.hypot(kx,ky)||1;
  const ukx=kx/klen, uky=ky/klen;
  const px=-uky, py=ukx;
  const beamHalf=138;
  const otherOffset=beamHalf+42;
  const otherDepth=8;
  const otherLeft={x:300-px*otherOffset+ukx*otherDepth, y:300-py*otherOffset+uky*otherDepth};
  const otherRight={x:300+px*otherOffset+ukx*otherDepth, y:300+py*otherOffset+uky*otherDepth};
  const activeHole=slide.active && slide.active[0] ? slide.active[0] : {x:300,y:300};
  const holeAngle=pointToAngle(activeHole.x, activeHole.y);
  const guideAngle=(holeAngle+22.5)%360;
  const guide=coordRadius(guideAngle,238);
  return {otherLeft,otherRight,guide};
}

  const awayX=-ukx, awayY=-uky;

function getDummingBintaLayout(kefkaAngle){
  const targetR=TARGET_R;
  const stackButtonR=16;
  const roleButtonR=14;
  const stackCenterR=targetR + stackButtonR;
  const outerCircleR=targetR * 1.5;
  const roleCenterR=outerCircleR + roleButtonR;
  function mk(side){
    const baseAngle=side==='L' ? (kefkaAngle+135)%360 : (kefkaAngle+225)%360;
    const hAngle=baseAngle;
    const tAngle=side==='L' ? (kefkaAngle+112.5)%360 : (kefkaAngle+247.5)%360;
    const dAngle=side==='L' ? (kefkaAngle+157.5)%360 : (kefkaAngle+202.5)%360;
    const stackPt=coordRadius(baseAngle, stackCenterR);
    const hPt=coordRadius(hAngle, roleCenterR);
    const tPt=coordRadius(tAngle, roleCenterR);
    const dPt=coordRadius(dAngle, roleCenterR);
    return {
      stack:{x:stackPt.x, y:stackPt.y, label:'全員', id:'stack'+side},
      H:{x:hPt.x, y:hPt.y, label:'H', id:side+'H'},
      T:{x:tPt.x, y:tPt.y, label:'T', id:side+'T'},
      D:{x:dPt.x, y:dPt.y, label:'D', id:side+'D'}
    };
  }
  const dir=coord(kefkaAngle,1.0);
  const awayX=-(dir.x-300)/(Math.hypot(dir.x-300,dir.y-300)||1);
  const awayY=-(dir.y-300)/(Math.hypot(dir.x-300,dir.y-300)||1);
  const x1=300-awayX*280, y1=300-awayY*280, x2=300+awayX*280, y2=300+awayY*280;
  return {L:mk('L'), R:mk('R'), axis:{x1,y1,x2,y2}};
}

function pairSlotForRole(role){
  if(['MT','H1'].includes(role)) return '4';
  if(['ST','H2'].includes(role)) return '1';
  if(['D1','D3'].includes(role)) return '3';
  return '2';
}
function isHeadsplitRoleGroup(role, headsplitRole){
  const kind=ROLE_KIND[role];
  return headsplitRole==='TH' ? (kind==='T' || kind==='H') : kind==='D';
}

function getCorrectChoiceForRole(slide, role){
  const party=currentProblem.party.find(p=>p.role===role);
  const kind=ROLE_KIND[role];
  if(slide.kind==='prep-tank') return kind==='T' ? 'exTank' : 'hdWait';
  if(slide.kind==='prep-split') return getSplitGroups().chaos.includes(role) ? 'chaosGroup' : 'exGroup';
  if(slide.kind==='prep-marker') return kind==='T' ? 'markerTankNorth' : 'markerPartySouth';
  if(slide.kind==='beam' && slide.beam===10) return party.marker==='禁止2' ? (slide.answerMap[party.marker] || 'wait') : 'other10';
  if(slide.kind==='beam') return slide.answerMap[party.marker] || 'wait';
  if(slide.kind==='binta-start'){
    const side=safeSideFromHand(slide.hand)==='右'?'R':'L';
    if(bintaActionFromHand(slide.hand)==='頭割り') return 'stack'+side;
    return side + kind;
  }
  if(slide.kind==='dumming-binta'){
    const side=dummingBintaSide(slide.hand);
    if(dummingBintaAction(slide.hand)==='頭割り') return 'stack'+side;
    return side + kind;
  }
  if(slide.kind==='vh-binta'){
    const side=safeSideFromHand(slide.hand)==='右'?'R':'L';
    if(bintaActionFromHand(slide.hand)==='頭割り') return 'stack'+side;
    return side + kind;
  }
  if(slide.kind==='thunder1') return kind==='T' ? 'tankNear' : 'wait';
  if(slide.kind==='thunder2') return kind==='T' ? 'tankNear' : 'wait';
  if(slide.kind==='dumming-bokuchin') return 'wait';
  if(slide.kind==='whitehole' || slide.kind==='blizzaga') return 'center';
  if(slide.kind==='jitanda-prep') return 'pair'+pairSlotForRole(role);
  if(slide.kind==='jitanda1'){
    const slot=pairSlotForRole(role);
    if(isHeadsplitRoleGroup(role, slide.headsplitRole)) return 'headsplit';
    return ['1','2'].includes(slot) ? 'towerB' : 'towerD';
  }
  if(slide.kind==='jitanda2'){
    const slot=pairSlotForRole(role);
    if(isHeadsplitRoleGroup(role, slide.headsplitRole)) return ['1','2'].includes(slot) ? 'towerB' : 'towerD';
    return 'center';
  }
  if(slide.kind==='towers') return 'scatter';
  return null;
}

function getAllCorrectChoices(slide){ return [...new Set(ROLES.map(r=>getCorrectChoiceForRole(slide,r)).filter(Boolean))]; }
function getCorrectMarkerChoiceForRole(slide, role){ const party=currentProblem.party.find(p=>p.role===role); return markerKind(party.marker); }
function getCorrectMarkerChoiceForSlide(slide){ return getCorrectMarkerChoiceForRole(slide, selfRole); }


function getVhAreas(slide){
  const facing=(slide.kefka.angle+45+360)%360;
  const defs=[
    {name:'front', label:'前', angle:facing},
    {name:'right', label:'右', angle:facing+90},
    {name:'back', label:'後', angle:facing+180},
    {name:'left', label:'左', angle:facing+270}
  ].map(a=>({...a, angle:(a.angle+360)%360, c:coord(a.angle,0.47), far:coord(a.angle,0.76)}));
  return {facing, defs};
}

function getVhBintaLayout(slide){
  const {defs}=getVhAreas(slide);
  const stackCenterR=TARGET_R+16;
  const roleCenterR=TARGET_R*1.5+14;
  const roleAngles={
    front:{t:-22.5,d:22.5},
    right:{t:-22.5,d:22.5},
    back:{t:22.5,d:-22.5},
    left:{t:22.5,d:-22.5}
  };
  return defs.map(d=>{
    const offs=roleAngles[d.name] || {t:-22.5,d:22.5};
    const stack=coordRadius(d.angle,stackCenterR);
    const H=coordRadius(d.angle,roleCenterR);
    const T=coordRadius(d.angle+offs.t,roleCenterR);
    const D=coordRadius(d.angle+offs.d,roleCenterR);
    return {...d, stack,H,T,D};
  });
}
function getVhFirstAreas(slide){
  const {defs}=getVhAreas(slide);
  const firstNames = slide.vh==='vertical' ? ['right','left'] : ['front','back'];
  const raised = slide.hand==='right' ? '左' : '右';
  const candidates=defs.filter(d=>firstNames.includes(d.name));
  const picked=candidates.find(d=>kefkaSideOfPoint(d.c.x,d.c.y,slide.kefka.angle)!==raised);
  return [picked ? picked.name : candidates[0].name];
}
function getVhFirstArea(slide){
  return getVhFirstAreas(slide)[0];
}
function kefkaSideOfPoint(x,y,kefkaAngle){
  const k=coord(kefkaAngle,1.0);
  const vx=300-k.x, vy=300-k.y; const len=Math.hypot(vx,vy)||1;
  const ux=vx/len, uy=vy/len;
  const rx=-uy, ry=ux;
  const px=x-300, py=y-300;
  return (px*rx+py*ry)>=0 ? '左' : '右';
}
function getVhFinalArea(slide, role){
  const {defs}=getVhAreas(slide);
  const finalNames = slide.vh==='vertical' ? ['front','back'] : ['right','left'];
  const safe=safeSideFromHand(slide.hand);
  const candidates=defs.filter(d=>finalNames.includes(d.name));
  const matched=candidates.find(d=>kefkaSideOfPoint(d.c.x,d.c.y,slide.kefka.angle)===safe);
  return (matched || candidates[0]).name;
}
function vhSectorPath(angle){
  const r=280, a1=(angle-45-90)*Math.PI/180, a2=(angle+45-90)*Math.PI/180;
  const x1=300+r*Math.cos(a1), y1=300+r*Math.sin(a1), x2=300+r*Math.cos(a2), y2=300+r*Math.sin(a2);
  return `M300,300 L${x1},${y1} A${r},${r} 0 0,1 ${x2},${y2} Z`;
}

function beamRectPath(angle,width){
  const rad=(angle-90)*Math.PI/180; const dx=Math.cos(rad), dy=Math.sin(rad); const px=-dy, py=dx; const L=360, W=width/2;
  const x1=300+dx*L+px*W, y1=300+dy*L+py*W;
  const x2=300+dx*L-px*W, y2=300+dy*L-py*W;
  const x3=300-dx*L-px*W, y3=300-dy*L-py*W;
  const x4=300-dx*L+px*W, y4=300-dy*L+py*W;
  return `M${x1},${y1} L${x2},${y2} L${x3},${y3} L${x4},${y4} Z`;
}

function halfRoomPath(kefkaAngle){
  const start=(kefkaAngle-90-90)*Math.PI/180, end=(kefkaAngle-90+90)*Math.PI/180; const r=285;
  const x1=300+r*Math.cos(start), y1=300+r*Math.sin(start), x2=300+r*Math.cos(end), y2=300+r*Math.sin(end);
  return `M300,300 L${x1},${y1} A${r},${r} 0 0,1 ${x2},${y2} Z`;
}
function safeHalfPath(kefkaAngle){ return halfRoomPath((kefkaAngle+180)%360); }
function centerFanPaths(kefkaAngle, hand, show){
  if(!show) return '';
  const fanAngles=[(kefkaAngle+90)%360,(kefkaAngle+315)%360,(kefkaAngle+270)%360,(kefkaAngle+225)%360];
  return fanAngles.map(a=>sectorPath(a,16,280)).join('');
}
function bintaAnswerFanPaths(slide, layout, show){
  if(!show) return '';
  const isDumming=slide.kind==='dumming-binta';
  const side=isDumming ? dummingBintaSide(slide.hand) : (safeSideFromHand(slide.hand)==='右' ? 'R' : 'L');
  const area=layout[side];
  if(!area) return '';
  const action=isDumming ? dummingBintaAction(slide.hand) : bintaActionFromHand(slide.hand);
  const pts=action==='頭割り' ? [area.stack] : [area.T, area.H, area.D];
  return pts.map(pt=>sectorPath(pointToAngle(pt.x,pt.y),10,280)).join('');
}

function vhBintaAnswerFanPaths(slide, show){
  if(!show) return '';
  return bintaAnswerFanPaths(slide, getChoiceLayout(slide.kefka.angle,'half'), show);
}

function dummingBintaFanPaths(kefkaAngle, show){
  if(!show) return '';
  const fanAngles=[(kefkaAngle+135)%360,(kefkaAngle+247.5)%360,(kefkaAngle+202.5)%360,(kefkaAngle+225)%360];
  return fanAngles.map(a=>sectorPath(a,16,280)).join('');
}

function sectorPath(centerAngle, widthDeg, r){
  const a1=(centerAngle-widthDeg/2-90)*Math.PI/180;
  const a2=(centerAngle+widthDeg/2-90)*Math.PI/180;
  const x1=300+r*Math.cos(a1), y1=300+r*Math.sin(a1);
  const x2=300+r*Math.cos(a2), y2=300+r*Math.sin(a2);
  return `<path class="aoe" d="M300,300 L${x1},${y1} A${r},${r} 0 0,1 ${x2},${y2} Z"></path>`;
}

function vhCastOverlay(facingAngle, kind){
  const label = kind==='vertical' ? 'ヴァーティカル' : 'ホリゾンタル';
  return `<rect class="castBox" x="214" y="44" width="172" height="34" rx="10"></rect><text class="vhLabel" x="300" y="68" text-anchor="middle">${label}</text>`;

function answerTextForSlide(slide){
  const me=getSelfParty();
  if(slide.kind==='prep-tank') return `位置確認では、MT/ST どちらもエクスデス内北寄りを正解扱いにしています。実践では1回目MT、2回目STが受けます。HDはカオス南側待機。`;
  if(slide.kind==='prep-split'){ const splitGroups=getSplitGroups(); return `2ボス分担（${currentStrat}）。カオス組は ${splitGroups.chaos.join('/')}、エクスデス組は ${splitGroups.ex.join('/')}。`; }
  if(slide.kind==='prep-marker') return `エクスデスとカオスは中央で重なっています。ここもサンダガが2回来るため、1回目はMT、2回目はSTがカオス内側で受けます。位置確認ではMT/STどちらもカオスのタゲサ内北寄りを正解扱いにしています。H/Dはカオスのタゲサ外南寄り。青枠で自分のサイコロ${me.dice}を確認し、下の3択からつけるべきマーカー種類（${markerKind(me.marker)}）を選びます。`;
  if(slide.kind==='beam' && slide.beam===10) return `ビーム10回目＋ぼくちん。ケフカは移動後の位置からぼくちん直線を出します。禁止2は他のビーム回と同じく担当ブラックホールを選び、それ以外はぼくちん直線の両側真ん中付近の安置（他）のどちらかを選びます。`;
  if(slide.kind==='beam') return `更新資料対応：この回は ${slide.patternNo===1?'パターン1':'パターン2'}。外周3個＋中間4個＋内側4個の配置。${[1,2,9,10].includes(slide.beam)?'この組は出た玉が消えて次の線へ移動。':(slide.beam<=5?'3〜5回目は同じ外周3か所から出る。':'6〜8回目は同じ外周3か所から出る。')} あなた（${me.marker}）は ${slide.answerMap[me.marker] ? '担当ブラックホール' : '待機'} を選びます。`;
  if(slide.kind==='binta-start') return `開始びんびんビンタ。ダミングはまだ来ない。${handLabel(slide.hand)}上げなので ${safeSideFromHand(slide.hand)}側で${bintaActionFromHand(slide.hand)}。`;
  if(slide.kind==='dumming-binta') return `先にダミングをよけ、その後ビンタの処理。フィールド中央から見て、ケフカが手を挙げていない側が安置です。${handLabel(slide.hand)}上げなら${dummingBintaVisualSide(slide.hand)}側で${dummingBintaAction(slide.hand)==='頭割り'?'集合':dummingBintaAction(slide.hand)}。`;
  if(slide.kind==='thunder1') return `サンダガが2回来ます。1回目はMT、2回目はSTがカオス内側で受けます。位置確認ではMT/STどちらもカオス内側を正解扱いにしています。H/Dはタゲサ外で待機。`;
  if(slide.kind==='thunder2') return `サンダガが2回来ます。1回目はMT、2回目はSTがカオス内側で受けます。位置確認ではMT/STどちらもカオス内側を正解扱いにしています。H/Dはタゲサ外で待機。`;
  if(slide.kind==='dumming-bokuchin') return `ケフカはここで移動。ダミング半面とぼくちん直線の両方を避けた左右の安置を使います。左右どちらかの待機位置を選びます。`;
  if(slide.kind==='whitehole') return `ホワイトホール。中央で詠唱を確認し、HPを満タンにします。`;
  if(slide.kind==='vh-binta') return `${slide.vh==='vertical'?'ヴァーティカル':'ホリゾンタル'}を確認。1回目は水色扇の安置ならOK。2回目は ${handLabel(slide.hand)}上げに対応し、中央からケフカを見て${safeSideFromHand(slide.hand)}側で${bintaActionFromHand(slide.hand)}（右手なら全員、左手ならロール散会）を選びます。両方正解で正解扱いです。`;
  if(slide.kind==='blizzaga') return `中央でブリザガを重ねる。`;
  if(slide.kind==='jitanda-prep') return `どんどこ地団駄準備。ケフカ基準で 4:MT/H1、1:ST/H2、3:D1/D3、2:D2/D4 の4方向へペア散会します。`;
  if(slide.kind==='jitanda1') return `どんどこ地団駄①。ケフカ基準で ${slide.headsplitPair} 方向に頭割り（${slide.headsplitRole==='TH'?'TH':'DPS'}）が表示されます。自分が頭割りロール側なら中央、そうでなければ 34組はD塔、12組はB塔へ。`;
  if(slide.kind==='jitanda2') return `どんどこ地団駄②。塔は①と同じ位置。さっき頭割りした側は、ケフカ基準で元のペア位置が1/2ならB塔、3/4ならD塔へ。さっき塔踏みした4人は中央へ。`;
  if(slide.kind==='towers') return `突出せよ＋タケノコ。中央にタケノコ円範囲が出るので、中心を避けてケフカ側の外周寄りへ散会。ブリザガ対策で動き続けます。`;
  return '';
}

function isSlideCorrect(slide, ctx=null){
  const correctChoice = getRenderedCorrectChoiceForSlide(slide, ctx);
  if(slide.kind==='prep-marker'){
    if(ctx && (ctx.key==='prepMarkerPos' || ctx.key==='prepMarkerMT' || ctx.key==='prepMarkerST')) return slide.selectedPos===correctChoice;
    if(ctx && ctx.key==='prepMarkerDice') return slide.selectedMarker===getCorrectMarkerChoiceForSlide(slide);
    return slide.selectedPos===correctChoice && slide.selectedMarker===getCorrectMarkerChoiceForSlide(slide);
  }
  if(slide.kind==='vh-binta'){
    if(ctx && ctx.key==='vhFirstOne') return getRenderedVhFirstAreas(slide, ctx).includes(slide.selectedVhSafe);
    if(ctx && ctx.key==='vhSecond') return slide.selected===correctChoice;
    return getRenderedVhFirstAreas(slide, ctx).includes(slide.selectedVhSafe) && slide.selected===correctChoice;
  }
  return slide.selected===correctChoice;
}

function judgeSlide(slide){
  slide.judged=true; slide.showAnswer=true; return isSlideCorrect(slide);
}
function resetSlide(slide){ slide.selected=null; slide.selectedPos=null; slide.selectedMarker=null; slide.selectedVhSafe=null; slide.judged=false; slide.showAnswer=false; }

function renderPosition(){
  const slideMeta=SLIDES[posSlide]; const slide=currentProblem.slides[slideMeta.id];
  const html=`
    <div class="slideTop"><button class="smallbtn" id="posMiniPrev">＜</button><span class="slideNo">${posSlide+1}/${SLIDES.length}</span><button class="smallbtn" id="posMiniNext">＞</button></div>
    <div class="mapwrap">
      <div id="posMap">${renderMapFor(slide,'pos')}</div>
      <div>
        <div class="eventTitle">${slideMeta.title}</div>
        <p class="legend">${answerTextForSlide(slide)}</p>
        <div class="result">${slide.judged ? (isSlideCorrect(slide)?'<span class="ok">正解！</span>':'<span class="bad">不正解</span>') : ''}</div>
        ${slide.showAnswer?`<div class="note">正解：${answerTextForSlide(slide)}</div>`:''}
        <div class="row" style="margin-top:8px">
          <button class="smallbtn" id="posPrev">前へ</button>
          <button class="smallbtn" id="posJudge">判定</button>
          <button class="smallbtn" id="posNext">次へ</button>
          <button class="smallbtn" id="posShow">正解を表示</button>
          <button class="smallbtn" id="posRestart">最初から</button>
          <button class="smallbtn" id="posNewProb">新しい問題</button>
          <button class="smallbtn" id="posPrevProb">一つ前の問題</button>
        </div>
      </div>
    </div>`;
  document.getElementById('pos').innerHTML=html;
  bindMapClicks('posMap', slide, renderPosition);
  document.getElementById('posPrev').onclick=()=>{ posSlide=Math.max(0,posSlide-1); renderPosition(); };
  document.getElementById('posNext').onclick=()=>{ posSlide=Math.min(SLIDES.length-1,posSlide+1); renderPosition(); };
  document.getElementById('posMiniPrev').onclick=()=>{ posSlide=Math.max(0,posSlide-1); renderPosition(); };
  document.getElementById('posMiniNext').onclick=()=>{ posSlide=Math.min(SLIDES.length-1,posSlide+1); renderPosition(); };
  document.getElementById('posJudge').onclick=()=>{ judgeSlide(slide); renderPosition(); };
  document.getElementById('posShow').onclick=()=>{ slide.showAnswer=true; slide.judged=true; renderPosition(); };
  document.getElementById('posRestart').onclick=()=>{ posSlide=0; renderPosition(); };
  document.getElementById('posNewProb').onclick=()=>newProblemPosition();
  document.getElementById('posPrevProb').onclick=()=>restorePreviousProblemPosition();
}

function bindMapClicks(containerId, slide, rerender){
  const practiceAnswerShowing = containerId==='pracMap' && getPracticeRenderContext(slide).showAnswer;
  if(slide.showAnswer || slide.judged || practiceAnswerShowing){
    document.querySelectorAll('#'+containerId+' [data-opt], #'+containerId+' [data-pos-opt], #'+containerId+' [data-marker-opt], #'+containerId+' [data-vh-safe-opt]').forEach(el=>{
      el.style.pointerEvents='none';
      el.style.cursor='default';
    });
    return;
  }
  document.querySelectorAll('#'+containerId+' [data-opt]').forEach(el=>el.onclick=()=>{ slide.selected=el.dataset.opt; rerender(); });
  document.querySelectorAll('#'+containerId+' [data-pos-opt]').forEach(el=>el.onclick=()=>{ slide.selectedPos=el.dataset.posOpt; rerender(); });
  document.querySelectorAll('#'+containerId+' [data-marker-opt]').forEach(el=>el.onclick=()=>{ slide.selectedMarker=el.dataset.markerOpt; rerender(); });
  document.querySelectorAll('#'+containerId+' [data-vh-safe-opt]').forEach(el=>el.onclick=()=>{ slide.selectedVhSafe=el.dataset.vhSafeOpt; rerender(); });
}

function slideDuration(i){ return PRACTICE_PLAN.find(p=>p.slide===i)?.duration || 5; }
function startPractice(){
  if(practiceRunning) return;
  if(practiceMode==='single' && practiceStarted && practiceRemain<=0 && practiceStep<PRACTICE_PLAN.length-1){
    practiceStep++;
    practiceSlide=getPracticeSlideIndex();
    practiceRemain=getPracticeSpec().duration;
    practiceLastRenderKey='';
  }
  practicePaused=false;
  if(!practiceStarted && practiceCountdown<=0){ practiceCountdown=3; practiceLastRenderKey=''; practiceRunning=true; practiceFrame=requestAnimationFrame(practiceTick); renderPractice(); return; }
  practiceRunning=true;
  practiceLastRenderKey='';
  const dur=getPracticeSpec().duration;
  practiceSlideStartedAt=performance.now()-(dur-practiceRemain)*1000;
  practiceFrame=requestAnimationFrame(practiceTick);
  renderPractice();
}
function practiceTick(now){
  if(!practiceRunning) return;
  if(practiceCountdown>0){
    if(!practiceSlideStartedAt) practiceSlideStartedAt=now;
    const cdElapsed=(now-practiceSlideStartedAt)/1000;
    const next=3-Math.floor(cdElapsed);
    practiceCountdown=Math.max(0,next);
    if(cdElapsed>=3){
      practiceCountdown=0;
      practiceStarted=true;
      practiceSlideStartedAt=now;
      practiceRemain=getPracticeSpec().duration;
      practiceLastRenderKey='';
    }
    const key=getPracticeRenderKey();
    if(key!==practiceLastRenderKey){ practiceLastRenderKey=key; renderPractice(); }
    else updatePracticeLight();
    practiceFrame=requestAnimationFrame(practiceTick);
    return;
  }
  const dur=getPracticeSpec().duration;
  const elapsed=(now-practiceSlideStartedAt)/1000;
  practiceRemain=Math.max(0,dur-elapsed);
  const key=getPracticeRenderKey();
  if(key!==practiceLastRenderKey){ practiceLastRenderKey=key; renderPractice(); }
  else updatePracticeLight();
  if(practiceRemain<=0){
    addPracticeLogForStep(practiceStep);
    if(practiceMode==='single'){
      stopPractice();
      practicePaused=false;
      if(practiceStep>=PRACTICE_PLAN.length-1) showFinalPracticeLog();
      else renderPractice();
      return;
    }
    if(practiceStep<PRACTICE_PLAN.length-1){
      practiceStep++;
      practiceSlide=getPracticeSlideIndex();
      practiceRemain=getPracticeSpec().duration;
      practiceSlideStartedAt=now;
      practiceLastRenderKey='';
      renderPractice();
      practiceFrame=requestAnimationFrame(practiceTick);
    }else{
      stopPractice();
      practiceRemain=getPracticeSpec().duration;
      updatePracticeTimer();
      showFinalPracticeLog();
    }
    return;
  }
  practiceFrame=requestAnimationFrame(practiceTick);
}
function stopPractice(){ practiceRunning=false; practicePaused=true; clearInterval(practiceTimer); practiceTimer=null; if(practiceFrame){ cancelAnimationFrame(practiceFrame); practiceFrame=null; } }
function updatePracticeTimer(){
  const el=document.getElementById('pracTimerBar');
  if(el){
    const spec=getPracticeSpec();
    const answerTime=spec.answer||0;
    const selectable=Math.max(0.001, spec.duration-answerTime);
    const selectableRemain=Math.max(0, practiceRemain-answerTime);
    el.style.width=Math.max(0,Math.min(100,selectableRemain/selectable*100))+'%';
  }
}
function updatePartyPanel(){ const panel=document.getElementById('partyPanel'); if(!panel) return; panel.classList.remove('hidden'); }
function getPracticeRenderKey(){
  const spec=getPracticeSpec();
  const ctx=getPracticeRenderContext(currentProblem.slides[SLIDES[getPracticeSlideIndex()].id]);
  return [practiceStep, getPracticeSlideIndex(), practiceCountdown, practiceRunning?'run':'stop', practicePaused?'paused':'live', ctx.hideHand?'hidehand':'hand', ctx.showAnswer?'ans':'noans', ctx.showPrepMarkerChoices?'choices':'nochoices', shouldShowPracticeParty()?'party':'roleonly'].join('|');
}
function updatePracticeLight(){
  updatePracticeTimer();
  const badge=document.getElementById('pracCenterBtn');
  if(badge && practiceCountdown>0) badge.textContent=String(practiceCountdown);
  const pause=document.getElementById('pracPause');
  if(pause) pause.textContent=practiceRunning?'一時停止':(practicePaused?'再開':'一時停止');
}
function renderPractice(){
  if(practiceRemain<=0) practiceRemain=getPracticeSpec().duration;
  practiceSlide=getPracticeSlideIndex();
  const slideMeta=SLIDES[practiceSlide]; const slide=currentProblem.slides[slideMeta.id];
  const centerLabel=practiceCountdown>0 ? String(practiceCountdown) : (!practiceRunning && !practiceStarted ? 'スタート' : (!practiceRunning && practicePaused ? '再開' : ''));
  const centerClass=practiceCountdown>0 ? 'practiceBadge small' : 'practiceBadge start';
  const overlay=centerLabel?`<div class="practiceOverlay"><button class="${centerClass}" id="pracCenterBtn">${centerLabel}</button></div>`:'';
  document.getElementById('practice').innerHTML=`
    <div class="row"><button class="smallbtn primary" id="pracStart">スタート</button><button class="smallbtn" id="pracPause">${practiceRunning?'一時停止':(practicePaused?'再開':'一時停止')}</button><label><b>モード：</b><select id="practiceModeSelect"><option value="continuous" ${practiceMode==='continuous'?'selected':''}>連続</option><option value="single" ${practiceMode==='single'?'selected':''}>一問ごと</option></select></label><button class="smallbtn" id="pracPrev">前へ</button><button class="smallbtn" id="pracJudge">判定</button><button class="smallbtn" id="pracNext">次へ</button><button class="smallbtn" id="pracShow">正解を表示</button><button class="smallbtn" id="pracRestart">最初から</button><button class="smallbtn" id="pracNewProb">新しい問題</button><button class="smallbtn" id="pracPrevProb">一つ前の問題</button></div>
    <div style="margin:10px 0" class="timer"><div id="pracTimerBar"></div></div>
    <div class="slideTop"><button class="smallbtn" id="pracMiniPrev">＜</button><span class="slideNo">${practiceSlide+1}/${SLIDES.length}</span><button class="smallbtn" id="pracMiniNext">＞</button></div>
    <div class="mapwrap"><div><div class="practiceMapWrap" id="pracMapWrap"><div id="pracMap">${renderMapFor(slide,'practice')}</div>${overlay}${practiceShowFinalLog?renderPracticeLog(true):''}</div>${renderPracticeLog()}</div><div><div class="eventTitle">${slideMeta.title}</div><div class="result">${slide.judged ? (isSlideCorrect(slide, getPracticeRenderContext(slide))?'<span class="ok">正解！</span>':'<span class="bad">不正解</span>') : ''}</div>${slide.showAnswer?`<div class="note">${answerTextForSlide(slide)}</div>`:''}</div></div>`;
  bindMapClicks('pracMap', slide, renderPractice);
  const startFn=()=>{ if(practiceRunning) return; if(practicePaused || practiceStarted) startPractice(); else { practiceStarted=false; practicePaused=false; practiceCountdown=3; practiceSlideStartedAt=0; practiceLastRenderKey=''; practiceRunning=true; practiceFrame=requestAnimationFrame(practiceTick); renderPractice(); } };
  document.getElementById('pracStart').onclick=startFn;
  document.getElementById('pracPause').onclick=()=>{ if(practiceRunning){ stopPractice(); renderPractice(); } else startPractice(); };
  document.getElementById('practiceModeSelect').onchange=e=>{ practiceMode=e.target.value; };
  if(document.getElementById('pracCenterBtn')) document.getElementById('pracCenterBtn').onclick=startFn;
  document.getElementById('pracPrev').onclick=()=>{ stopPractice(); practiceStep=Math.max(0,practiceStep-1); practiceSlide=getPracticeSlideIndex(); practiceRemain=getPracticeSpec().duration; practiceStarted=true; practiceCountdown=0; practiceShowFinalLog=false; practiceLastRenderKey=''; renderPractice(); };
  document.getElementById('pracMiniPrev').onclick=()=>{ stopPractice(); practiceStep=Math.max(0,practiceStep-1); practiceSlide=getPracticeSlideIndex(); practiceRemain=getPracticeSpec().duration; practiceStarted=true; practiceCountdown=0; practiceShowFinalLog=false; practiceLastRenderKey=''; renderPractice(); };
  document.getElementById('pracNext').onclick=()=>{ stopPractice(); practiceStep=Math.min(PRACTICE_PLAN.length-1,practiceStep+1); practiceSlide=getPracticeSlideIndex(); practiceRemain=getPracticeSpec().duration; practiceStarted=true; practiceCountdown=0; practiceShowFinalLog=false; practiceLastRenderKey=''; renderPractice(); };
  document.getElementById('pracMiniNext').onclick=()=>{ stopPractice(); practiceStep=Math.min(PRACTICE_PLAN.length-1,practiceStep+1); practiceSlide=getPracticeSlideIndex(); practiceRemain=getPracticeSpec().duration; practiceStarted=true; practiceCountdown=0; practiceShowFinalLog=false; practiceLastRenderKey=''; renderPractice(); };
  document.getElementById('pracJudge').onclick=()=>{ judgeSlide(slide); addPracticeLogForStep(practiceStep); renderPractice(); };
  document.getElementById('pracShow').onclick=()=>{ slide.showAnswer=true; slide.judged=true; addPracticeLogForStep(practiceStep); renderPractice(); };
  document.getElementById('pracRestart').onclick=()=>{ stopPractice(); practiceStep=0; practiceSlide=0; practiceRemain=getPracticeSpec().duration; practiceStarted=false; practiceCountdown=0; practicePaused=false; practiceLastRenderKey=''; resetPracticeLog(); renderPractice(); };
  document.getElementById('pracNewProb').onclick=()=>newProblemPractice();
  document.getElementById('pracPrevProb').onclick=()=>restorePreviousProblemPractice();
  updatePracticeTimer(); renderCards(); updatePartyPanel();
}

function renderAll(){
  populateSelfSelect();
  populateStratSelect();
  renderCards();
  renderLearn();
  renderPosition();
  renderPractice();
  updatePartyPanel();
}

document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{ document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active')); b.classList.add('active'); document.querySelectorAll('.tabPage').forEach(p=>p.classList.add('hidden')); document.getElementById(b.dataset.tab).classList.remove('hidden'); renderCards(); updatePartyPanel(); });
document.getElementById('newProblemTop').onclick=()=>{ const keep=posSlide; newProblemPosition(); posSlide=keep; renderAll(); };
document.getElementById('prevProblemTop').onclick=()=>{ const keep=posSlide; restorePreviousProblemPosition(); posSlide=keep; renderAll(); };
newProblem();
